services:
  - type: web
    name: ai-receptionist
    runtime: python
    plan: starter # persistent disks require a paid instance
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATA_DIR
        value: /data
      - key: ADMIN_TOKEN
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_WEBHOOK_SECRET
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TWILIO_PHONE_NUMBER_SK
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: LEAD_EMAIL
        sync: false
      - key: APIFY_TOKEN
        sync: false
      - key: IMMOBILIARE_SEARCH_URL
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: OUTREACH_FROM_EMAIL
        sync: false
      - key: CALENDLY_LINK
        sync: false
